# Gitleaks configuration for the `claude-plugins` repo.
#
# CRITICAL: `[extend] useDefault = true` keeps gitleaks' full upstream ruleset.
# A custom config REPLACES the built-in rules unless it extends them, so without
# this the scanner would detect nothing. Everything below only *adds* allowlists
# (false-positive suppression); it never removes a rule.
#
# See CI: .github/workflows/gitleaks.yml (gitleaks auto-loads this file at the
# scan root). Genuine historical findings would be suppressed via
# .gitleaks-baseline.json, not here — this file is only for intentional,
# self-documenting placeholders.

title = "claude-plugins repo gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Documented placeholder values and *.example template files"
# Match against the whole line so it works regardless of which rule fires.
regexTarget = "line"
# 1) Explicit placeholder convention — any value wrapped in [placeholder: ...]:
#      PUSHOVER_TOKEN=[placeholder: Pushover application API token]
#    Self-documenting AND scanner-safe. Prefer this over cryptic dummy strings.
regexes = [
  '''\[placeholder:[^\]]*\]''',
]
# 2) *.example / *.example.* template files ship fake values by design.
paths = [
  '''\.example$''',
  '''\.example\.''',
]
