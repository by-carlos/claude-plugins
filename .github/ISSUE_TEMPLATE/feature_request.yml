name: Feature or idea
description: Suggest a new plugin, command, or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and where does the current tooling fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed idea
      description: What would you like to see? A rough sketch is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about (optional).
    validations:
      required: false
